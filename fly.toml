# Fly.io — https://fly.io/docs/reference/configuration/
# 1) fly apps create jira-mcp   # or rename `app` below after fly launch
# 2) fly volumes create mcp_data --region iad --size 1   # match primary_region
# 3) fly secrets set DEFAULT_JIRA_BASE_URL=https://your-site.atlassian.net \
#      MCP_PUBLIC_ORIGIN=https://jira-mcp.fly.dev \
#      MCP_SETUP_SECRET=<random-long-secret>
# 4) fly deploy

app = "jira-mcp"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  MCP_HTTP_HOST = "0.0.0.0"
  MCP_HTTP_PORT = "3333"
  MCP_DATA_DIR = "/app/data"

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "3s"

[[mounts]]
  source = "mcp_data"
  destination = "/app/data"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
